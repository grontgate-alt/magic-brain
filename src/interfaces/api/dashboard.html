<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Magic Brain Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .header h1 { font-size: 3em; margin-bottom: 10px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .stat-number { font-size: 3em; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; margin-top: 5px; }
        .tools-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px; 
        }
        .tool-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .tool-card:hover { transform: translateY(-5px); }
        .tool-name { font-weight: bold; color: #333; margin-bottom: 8px; }
        .tool-desc { color: #666; font-size: 0.9em; }
        .badge { 
            display: inline-block; 
            padding: 3px 8px; 
            border-radius: 5px; 
            font-size: 0.75em; 
            margin-left: 10px;
        }
        .badge-mcp { background: #667eea; color: white; }
        .badge-local { background: #10b981; color: white; }
        .chat-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        input, button {
            padding: 12px 20px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            font-size: 1em;
        }
        input { width: 100%; margin-bottom: 15px; }
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #764ba2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Magic Brain</h1>
            <p>AI Agent с 500+ навыками</p>
        </div>
        
        <div class="stats" id="stats"></div>
        
        <div class="chat-box">
            <h2>💬 Протестировать агента</h2>
            <input type="text" id="query" placeholder="Введите команду (например: 'покажи файлы в /home/der')...">
            <button onclick="testAgent()">Отправить</button>
            <div id="response" style="margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; display: none;"></div>
        </div>
        
        <h2 style="color: white; margin: 30px 0 20px;">🔧 Доступные инструменты</h2>
        <input type="text" id="search" placeholder="🔍 Поиск инструментов..." oninput="filterTools()">
        <div class="tools-grid" id="tools"></div>
    </div>

    <script>
        async function loadTools() {
            const res = await fetch('/tools');
            const data = await res.json();
            
            // Stats
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-number">${data.total}</div><div class="stat-label">Всего инструментов</div></div>
                <div class="stat-card"><div class="stat-number">${data.mcp_count}</div><div class="stat-label">MCP навыки</div></div>
                <div class="stat-card"><div class="stat-number">${(data.examples||[]).filter(x=>x.includes('filesystem')).length}</div><div class="stat-label">Файловая система</div></div>
                <div class="stat-card"><div class="stat-number">${(data.examples||[]).filter(x=>x.includes('github')).length}</div><div class="stat-label">GitHub</div></div>
            `;
            
            // Tools
            const tools = data.examples || [];
            document.getElementById('tools').innerHTML = tools.map(t => `
                <div class="tool-card" data-name="${t}">
                    <div class="tool-name">${t} <span class="badge ${t.includes('mcp')?'badge-mcp':'badge-local'}">${t.includes('mcp')?'MCP':'Local'}</span></div>
                    <div class="tool-desc">${t.replace(/_/g, ' ')}</div>
                </div>
            `).join('');
        }
        
        async function testAgent() {
            const q = document.getElementById('query').value;
            const res = await fetch('/process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: 1, text: q, force_mode: 'tools'})
            });
            const data = await res.json();
            const div = document.getElementById('response');
            div.style.display = 'block';
            div.innerHTML = `<strong>Ответ:</strong> ${data.reply || data}`;
        }
        
        function filterTools() {
            const s = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.tool-card').forEach(c => {
                c.style.display = c.dataset.name.toLowerCase().includes(s) ? 'block' : 'none';
            });
        }
        
        loadTools();
    </script>
</body>
</html>
