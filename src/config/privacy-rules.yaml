# 袩褉邪胁懈谢邪 屑邪褉褕褉褍褌懈蟹邪褑懈懈 写邪薪薪褘褏
routes:
  - pattern: "锌邪褉芯谢褜|password|token|泻谢褞褔|褋械泻褉械褌|credential|auth"
    action: BLOCK_CLOUD
    fallback: LOCAL_LLM
  - pattern: "谢懈褔薪褘泄|锌褉懈胁邪褌|泻芯薪褎懈写械薪褑懈邪谢褜薪芯|谢懈褔薪邪褟 锌械褉械锌懈褋泻邪|屑芯懈 写邪薪薪褘械"
    action: BLOCK_CLOUD
    fallback: LOCAL_LLM
  - pattern: "email|锌芯褔褌邪|telegram|whatsapp|屑械褋褋械薪写卸械褉"
    action: BLOCK_CLOUD
    fallback: LOCAL_LLM
  - pattern: "锌芯谐芯写邪|薪芯胁芯褋褌懈|褉械褑械锌褌|胁懈泻懈锌械写懈褟|芯斜褖懈械_蟹薪邪薪懈褟|锌械褉械胁芯写"
    action: ALLOW_CLOUD
    fallback: LOCAL_LLM

scrubber:
  remove:
    - "\\b\\d{4}[- ]?\\d{4}[- ]?\\d{4}[- ]?\\d{4}\\b"  # 泻邪褉褌褘
    - "\\b\\+?7[\\s\\-]?\\(?\\d{3}\\)?[\\s\\-]?\\d{3}[\\s\\-]?\\d{2}[\\s\\-]?\\d{2}\\b"  # 褌械谢械褎芯薪褘 袪肖
    - "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[a-zA-Z]{2,}\\b"  # email
  replace:
    "懈屑褟": "[PERSON]"
    "邪写褉械褋": "[ADDRESS]"
    "褌械谢械褎芯薪": "[PHONE]"
    "email": "[EMAIL]"
    "锌邪褉芯谢褜": "[REDACTED]"
