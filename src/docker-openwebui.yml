version: '3.8'
services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports: ["3000:8080"]
    environment:
      - OPENAI_API_KEY=sk-or-v1-xxx
      - OPENAI_API_BASE_URL=http://192.168.11.101:8000/v1
      - WEBUI_AUTH=false
    volumes: ["open-webui:/app/backend/data"]
    restart: unless-stopped
volumes: { open-webui: }
