id: debug_and_fix
name: "Поиск и исправление ошибки в скрипте"
description: "Запускает скрипт, ловит вывод ошибки, ищет решение, применяет фикс, проверяет"
category: "code"
version: "1.0.0"
timeout_sec: 120
steps:
  - id: run_script
    tool: execute_bash
    args:
      command: "timeout 10 python3 {{ file_path | default('/tmp/test.py') }} 2>&1 || true"
    on_error: abort

  - id: analyze_error
    tool: web_search
    args:
      query: "python3 fix {{ run_script_output | truncate(100) | replace('\n', ' ') }}"
    condition: "run_script.success == true and 'error' in run_script_output.lower()"

  - id: apply_fix_stub
    tool: write_file
    args:
      path: "{{ file_path | default('/tmp/test.py') }}"
      content: "# Auto-fix stub applied\nprint('Fixed based on: {{ analyze_error_output | truncate(50) }}')"
    condition: "analyze_error.success == true"

  - id: verify_fix
    tool: execute_bash
    args:
      command: "timeout 5 python3 {{ file_path | default('/tmp/test.py') }} 2>&1 || true"
    condition: "apply_fix_stub.success == true"
